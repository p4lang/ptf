# Config file for automatic testing using github actions
#

name: Unit_Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify-python:
    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
        scapy_version: [2.5.0, 2.6.1]
      # Don't abort other runs when one of them fails, to ease debugging.
      fail-fast: false

    name: Python code verification (src)
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: |
          make set-dev
          source ./CI/uv-setup-env.bash
          uv pip install scapy==${{ matrix.scapy_version }}
      - name: Verify code (python w/black)
        run: |
          make format-check
      - name: Run pytests (utests/tests)
        run: | 
          make test
  test:
    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
        scapy_version: [2.5.0, 2.6.1]
      # Don't abort other runs when one of them fails, to ease debugging.
      fail-fast: false

    name: run ptf unit tests
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6

    - name: Dependencies
      run: |
        sudo apt-get install cmake libffi-dev ethtool python3-dev python3-venv
        make set-dev
        source ./CI/uv-setup-env.bash
        uv pip install --upgrade pip setuptools nose2 wheel
        uv pip install scapy==${{ matrix.scapy_version }}

        bash CI/install-pynng.sh

    - name: Install
      run: |
        source ./CI/uv-setup-env.bash
        uv pip install .
        ptf --version

    - name: Before_script
      run: |
        cd ptf_nn/; sudo ./veth_setup.sh; cd ..

    - name: Script
      run: |
        source ./CI/uv-setup-env.bash
        uv pip --verbose list
        python3 CI/check-pynng.py
        ./CI/run_tests.sh
